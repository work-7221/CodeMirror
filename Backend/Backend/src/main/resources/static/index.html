<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeMirror</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>
            CodeMirror
        </h1>

        <h2>
            Code Similarity Checker
        </h2>

        <h2>Upload ZIP File</h2>

        <input type="file" id="zipFile">

        <button onclick="uploadZip()">Upload</button>

        <p id="result"></p>

        <h2>
            Results
        </h2>

        <table>
            <tr>
                <th>File 1</th>
                <th>File 2</th>
                <th>Similarity</th>
            </tr>
        </table>
    </div>

    <script src="functionality.js">

    </script>
</body>

</html>
